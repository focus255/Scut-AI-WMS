# ===================================================================
# 智库WMS - 智能仓储管理系统 公共配置
# @author Focus
# @date 2026-06-03
# ===================================================================

# 默认激活 dev + local 双 profile（local 用于本地密钥覆盖，已在 .gitignore 排除）
spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev,local}
    # application-local.yml 不存在时 Spring 自动跳过，不会报错
  application:
    name: smart-wms-backend
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8080}

# ---- MyBatis-Plus 配置（所有环境共用） ----
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# ---- JWT 配置（生产环境通过环境变量注入） ----
jwt:
  secret: ${JWT_SECRET:smart-wms-jwt-secret-key-2026-must-be-at-least-256-bits!!}
  expiration-ms: ${JWT_EXPIRATION_MS:7200000}

# ---- AI 大模型配置 ----
# ⚠️ 此文件由 git 追踪，严禁写入真实 API Key！
# ⚠️ 真实 Key 请通过以下方式之一配置：
#    1. 环境变量:  export AI_LLM_API_KEY=sk-xxx
#    2. 本地文件:  复制 application-local.yml.example 为 application-local.yml 并填入
# 未配置真实 Key 时自动降级为本地规则引擎
ai:
  llm:
    api-key: ${AI_LLM_API_KEY:demo-api-key}
    base-url: ${AI_LLM_BASE_URL:https://api.deepseek.com/v1}
    model: ${AI_LLM_MODEL:deepseek-chat}
    connect-timeout: 5000
    read-timeout: 30000

# ---- 日志配置 ----
logging:
  level:
    root: INFO
    com.smartwms: DEBUG
    com.smartwms.mapper: DEBUG
